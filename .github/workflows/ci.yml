name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURSO_DATABASE_URL: file:ci.db
  TURSO_AUTH_TOKEN: ""
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  # Dummy values, never used against real services — just enough to satisfy
  # src/lib/env.ts's Zod validation so `next build` can analyze route
  # handlers. Never put real secrets in this file.
  ENCRYPTION_KEY: "/6U3kt17XTChhhX17IsV0D7acEEoyDJrYlqQ3Obad+8="
  AUTH_SECRET: "ci-dummy-auth-secret"
  TELEGRAM_BOT_TOKEN: "ci-dummy-bot-token"
  TELEGRAM_WEBHOOK_SECRET: "ci-dummy-webhook-secret"
  NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: "ci_dummy_bot"
  ANTHROPIC_API_KEY: "ci-dummy-anthropic-key"
  GROQ_API_KEY: "ci-dummy-groq-key"
  CRON_SECRET: "ci-dummy-cron-secret"
  VAPID_PUBLIC_KEY: "ci-dummy-vapid-public-key"
  VAPID_PRIVATE_KEY: "ci-dummy-vapid-private-key"
  VAPID_SUBJECT: "mailto:ci@example.com"
  NEXT_PUBLIC_VAPID_PUBLIC_KEY: "ci-dummy-vapid-public-key"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build
