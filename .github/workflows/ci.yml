name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

env:
  TURSO_DATABASE_URL: file:ci.db
  TURSO_AUTH_TOKEN: ""
  NEXT_PUBLIC_APP_URL: http://localhost:3000
  # Dummy values, never used against real services — just enough to satisfy
  # src/lib/env.ts's Zod validation so `next build` can analyze route
  # handlers. Never put real secrets in this file.
  ENCRYPTION_KEY: "/6U3kt17XTChhhX17IsV0D7acEEoyDJrYlqQ3Obad+8="
  AUTH_SECRET: "ci-dummy-auth-secret"
  TELEGRAM_BOT_TOKEN: "ci-dummy-bot-token"
  TELEGRAM_WEBHOOK_SECRET: "ci-dummy-webhook-secret"
  NEXT_PUBLIC_TELEGRAM_BOT_USERNAME: "ci_dummy_bot"

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v4
        with:
          version: 11

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: pnpm

      - run: pnpm install --frozen-lockfile

      - run: pnpm lint

      - run: pnpm typecheck

      - run: pnpm test

      - run: pnpm build
